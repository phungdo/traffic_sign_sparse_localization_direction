<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KITTI-TS Dataset Viewer — Han et al. 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-dim: #8b90a5;
    --accent: #6c7cff;
    --accent-glow: rgba(108, 124, 255, 0.15);
    --left: #ff6b9d;
    --back: #4ecdc4;
    --right: #ffd93d;
    --train: #6c7cff;
    --test: #ff6b9d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #242836 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6c7cff, #4ecdc4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .header p { color: var(--text-dim); font-size: 0.85rem; }

  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .stat-chip .num {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); background: var(--accent-glow); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.dir-left.active { background: var(--left); border-color: var(--left); }
  .btn.dir-back.active { background: var(--back); border-color: var(--back); color: #111; }
  .btn.dir-right.active { background: var(--right); border-color: var(--right); color: #111; }

  .content { padding: 1.5rem 2.5rem; }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 1.5rem 0 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title .badge {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-weight: 400;
    color: var(--text-dim);
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.25s;
  }
  .cat-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .cat-card-header {
    padding: 0.75rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .cat-card-header h3 { font-size: 0.85rem; font-weight: 600; }
  .cat-card-header .count { color: var(--accent); font-weight: 700; }
  .cat-card-body {
    padding: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
  }

  .sign-thumb {
    width: 56px;
    height: 56px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sign-thumb:hover {
    transform: scale(1.15);
    z-index: 10;
    border-color: var(--accent);
    box-shadow: 0 4px 15px rgba(108,124,255,0.4);
  }
  .sign-thumb.dir-0 { border-color: var(--left); }
  .sign-thumb.dir-1 { border-color: var(--back); }
  .sign-thumb.dir-2 { border-color: var(--right); }

  /* Orientation view */
  .orientation-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .orient-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .orient-card-header {
    padding: 0.75rem 1rem;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .orient-card.left .orient-card-header { background: linear-gradient(135deg, rgba(255,107,157,0.15), transparent); }
  .orient-card.back .orient-card-header { background: linear-gradient(135deg, rgba(78,205,196,0.15), transparent); }
  .orient-card.right .orient-card-header { background: linear-gradient(135deg, rgba(255,217,61,0.15), transparent); }
  .orient-card-body {
    padding: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-height: 400px;
    overflow-y: auto;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    overflow: hidden;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    background: #111;
    padding: 1rem;
  }
  .modal-info {
    padding: 1.25rem;
  }
  .modal-info h3 { margin-bottom: 0.75rem; font-size: 1rem; }
  .modal-info .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .modal-info .detail-row .label { color: var(--text-dim); }
  .dir-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .dir-badge.left { background: rgba(255,107,157,0.2); color: var(--left); }
  .dir-badge.back { background: rgba(78,205,196,0.2); color: var(--back); }
  .dir-badge.right { background: rgba(255,217,61,0.2); color: var(--right); }

  .split-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .split-badge.train { background: rgba(108,124,255,0.2); color: var(--train); }
  .split-badge.test { background: rgba(255,107,157,0.2); color: var(--test); }

  .cat-card-body::-webkit-scrollbar,
  .orient-card-body::-webkit-scrollbar { width: 4px; }
  .cat-card-body::-webkit-scrollbar-thumb,
  .orient-card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 768px) {
    .header, .content { padding: 1rem; }
    .orientation-section { grid-template-columns: 1fr; }
    .category-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🚦 KITTI-TS Dataset Viewer</h1>
  <p>Han et al. 2025 — Traffic sign localization and orientation classification</p>
  <div class="stats-bar" id="statsBar"></div>

    <button class="btn" onclick="toggleFilter('split', 'test')">Test</button>
  </div>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

  const filtered = getFiltered();
  bar.innerHTML = `
    <div class="stat-chip"><span class="num">${filtered.length}</span> Signs</div>
    <div class="stat-chip"><span class="num">${new Set(filtered.map(s=>s.category)).size}</span> Categories</div>
    <div class="stat-chip"><span class="num">${filtered.reduce((a,s)=>a+s.num_frames,0).toLocaleString()}</span> Bounding Boxes</div>
    <div class="stat-chip"><span class="num">${filtered.filter(s=>s.direction===0).length}</span> ← Left</div>
    <div class="stat-chip"><span class="num">${filtered.filter(s=>s.direction===1).length}</span> ↓ Back</div>
    <div class="stat-chip"><span class="num">${filtered.filter(s=>s.direction===2).length}</span> → Right</div>
  `;
}

function getFiltered() {
  return DATA.filter(s => {
    if (filters.dir !== null && s.direction !== filters.dir) return false;
    if (filters.split !== null && s.split !== filters.split) return false;
    return true;
  });
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.controls .btn:nth-child(-n+3)').forEach((b,i) => {
    b.classList.toggle('active', ['category','orientation','all'][i] === v);
  });
  render();
}

function toggleFilter(type, val) {
  if (filters[type] === val) filters[type] = null;
  else filters[type] = val;
  
  // Update button states
  if (type === 'dir') {
    document.querySelectorAll('.btn.dir-left, .btn.dir-back, .btn.dir-right').forEach(b => b.classList.remove('active'));
    if (filters.dir !== null) {
      document.querySelector(`.btn.dir-${DIR_CLASSES[filters.dir]}`).classList.add('active');
    }
  }
  if (type === 'split') {
    document.querySelectorAll('.controls .btn').forEach(b => {
      if (b.textContent === 'Train') b.classList.toggle('active', filters.split === 'train');
      if (b.textContent === 'Test') b.classList.toggle('active', filters.split === 'test');
    });
  }
  renderStats();
  render();
}

function render() {
  const el = document.getElementById('content');
  const signs = getFiltered();
  
  if (currentView === 'category') renderByCategory(el, signs);
  else if (currentView === 'orientation') renderByOrientation(el, signs);
  else renderAll(el, signs);
}

function makeThumb(s) {
  return `<img class="sign-thumb dir-${s.direction}" 
    src="data:image/jpeg;base64,${s.crop_b64}" 
    title="Sign ${s.sign_id} | Cat ${s.category} | ${s.direction_name} | ${s.split}"
    onclick="showModal('${s.sign_id}')" />`;
}

function renderByCategory(el, signs) {
  const groups = {};
  signs.forEach(s => {
    if (!groups[s.category]) groups[s.category] = [];
    groups[s.category].push(s);
  });
  
  el.innerHTML = '<div class="section-title">By Category <span class="badge">matching Fig. 6</span></div>';
  el.innerHTML += '<div class="category-grid">' +
    Object.keys(groups).sort((a,b)=>a-b).map(cat => {
      const items = groups[cat];
      return `<div class="cat-card">
        <div class="cat-card-header">
          <h3>Cat ${cat}: ${CAT_NAMES[cat] || 'Unknown'}</h3>
          <span class="count">${items.length}</span>
        </div>
        <div class="cat-card-body">${items.map(makeThumb).join('')}</div>
      </div>`;
    }).join('') + '</div>';
}

function renderByOrientation(el, signs) {
  el.innerHTML = '<div class="section-title">By Orientation <span class="badge">matching Fig. 6</span></div>';
  el.innerHTML += '<div class="orientation-section">' +
    [0,1,2].map(d => {
      const items = signs.filter(s=>s.direction===d);
      return `<div class="orient-card ${DIR_CLASSES[d]}">
        <div class="orient-card-header">${['← Leftward','↓ Backward','→ Rightward'][d]} (${items.length})</div>
        <div class="orient-card-body">${items.map(makeThumb).join('')}</div>
      </div>`;
    }).join('') + '</div>';
}

function renderAll(el, signs) {
  el.innerHTML = `<div class="section-title">All Signs <span class="badge">${signs.length} total</span></div>`;
  el.innerHTML += '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
    signs.map(makeThumb).join('') + '</div>';
}

function showModal(signId) {
  const s = DATA.find(d => d.sign_id === signId);
  if (!s) return;
  document.getElementById('modalImg').src = `data:image/jpeg;base64,${s.crop_b64}`;
  document.getElementById('modalInfo').innerHTML = `
    <h3>Sign: ${s.sign_id}</h3>
    <div class="detail-row"><span class="label">Category</span><span>${s.category} — ${CAT_NAMES[s.category]}</span></div>
    <div class="detail-row"><span class="label">Orientation</span><span class="dir-badge ${DIR_CLASSES[s.direction]}">${s.direction_name}</span></div>
    <div class="detail-row"><span class="label">Split</span><span class="split-badge ${s.split}">${s.split}</span></div>
    <div class="detail-row"><span class="label">Frames</span><span>${s.num_frames}</span></div>
    <div class="detail-row"><span class="label">Sample Frame</span><span style="font-size:0.75rem">${s.frame_id}</span></div>
    <div class="detail-row"><span class="label">Geolocation</span><span style="font-size:0.75rem">${s.geolocation[0].toFixed(6)}, ${s.geolocation[1].toFixed(6)}</span></div>
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('active');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('active');
});

init();
</script>
</body>
</html>
